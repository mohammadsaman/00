  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://encrypted-tbn1.gstatic.com data:; script-src 'self' 'unsafe-inline';" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />

  <!--  Added display=swap for better font loading performance -->

  <style>
    :root {
      --bg: #080c14;
      --card: #0e1420;
      --accent: #4fffce;
      --accent2: #7b6ff0;
      --text: #f0f4ff;
      --muted: #5a6480;
      --border: rgba(255,255,255,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before { width: 500px; height: 500px; background: var(--accent2); top: -100px; left: -150px; }
    body::after  { width: 400px; height: 400px; background: var(--accent);  bottom: -80px; right: -100px; }

  
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 44px 36px 40px;
      border-radius: 28px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow:
        0 0 0 1px rgba(79,255,206,0.04),
        0 24px 60px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 22px;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, var(--accent), var(--accent2), var(--accent));
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-mask {
      position: relative;
      z-index: 1;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: var(--card);
    }

    .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

    .online-dot {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--card);
      z-index: 2;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79,255,206,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(79,255,206,0); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .links { display: flex; flex-direction: column; gap: 12px; }

    .links a {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s ease both;
    }

    .links a:nth-child(1) { animation-delay: 0.1s; }
    .links a:nth-child(2) { animation-delay: 0.18s; }
    .links a:nth-child(3) { animation-delay: 0.26s; }
    .links a:nth-child(4) { animation-delay: 0.34s; }

    .links a::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: inherit;
    }

    .links a.fb::before { background: linear-gradient(135deg, rgba(24,119,242,0.15), transparent); }
    .links a.ig::before { background: linear-gradient(135deg, rgba(225,48,108,0.15), transparent); }
    .links a.yt::before { background: linear-gradient(135deg, rgba(255,0,0,0.15), transparent); }
    .links a.tt::before { background: linear-gradient(135deg, rgba(105,201,208,0.15), transparent); }

    .links a:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .links a:hover::before { opacity: 1; }

    .icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .icon-wrap svg { width: 17px; height: 17px; }

    .fb .icon-wrap { background: rgba(24,119,242,0.18); }
    .fb .icon-wrap svg { fill: #5b9cf6; }
    .ig .icon-wrap { background: rgba(225,48,108,0.18); }
    .ig .icon-wrap svg { fill: #f06292; }
    .yt .icon-wrap { background: rgba(255,0,0,0.18); }
    .yt .icon-wrap svg { fill: #f44336; }
    .tt .icon-wrap { background: rgba(105,201,208,0.18); }
    .tt .icon-wrap svg { fill: #69c9d0; }

    .link-label { flex: 1; text-align: left; position: relative; z-index: 1; }

    .link-arrow {
      position: relative; z-index: 1;
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.35;
    }
    .link-arrow svg { width: 14px; height: 14px; fill: var(--muted); }
    .links a:hover .link-arrow { transform: translateX(3px); opacity: 1; }
    .links a:hover .link-arrow svg { fill: var(--accent); }

    .footer { margin-top: 28px; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      h1 { font-size: 24px; }
      .links a { font-size: 14px; padding: 12px 16px; }
      .avatar-mask { width: 92px; height: 92px; }
    }
  </style>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    let W, H, particles;

   
    const PARTICLE_COLORS = [
      { r: 79,  g: 255, b: 206 },  // accent  #4fffce
      { r: 123, g: 111, b: 240 },  // accent2 #7b6ff0
    ];

    function rgba(c, a) {
      return `rgba(${c.r},${c.g},${c.b},${a})`;
    }

    function initParticles() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;

      particles = Array.from({ length: 55 }, () => {
        const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.8 + 0.4,
          color,
          speedX: (Math.random() - 0.5) * 0.4,
          speedY: (Math.random() - 0.5) * 0.4,
          baseOpacity: Math.random() * 0.4 + 0.15,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * 0.01 + 0.005,
        };
      });
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            const alpha = (1 - dist / 130) * 0.1;
            ctx.beginPath();
            // ✅ FIX 5: Use rgba() for line color too
            ctx.strokeStyle = `rgba(79,255,206,${alpha})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);
      drawLines();

      particles.forEach(p => {
        p.pulse += p.pulseSpeed;
        const opacity = p.baseOpacity + Math.sin(p.pulse) * 0.1;

        // Draw dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = rgba(p.color, opacity);
        ctx.fill();

        // ✅ FIX 6: Glow gradient now uses proper rgba() - no broken hex concat
        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);
        glow.addColorStop(0, rgba(p.color, 0.08));
        glow.addColorStop(1, rgba(p.color, 0));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      });

      requestAnimationFrame(animate);
    }

    initParticles();
    animate();
    window.addEventListener('resize', initParticles);
  </script>
